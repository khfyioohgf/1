yaml
name: RDP + Tailscale + RustDesk + CRD (A)

on:
  workflow_dispatch:
    inputs:
      ts_tailnet:
        description: "Tailscale tailnet (e.g. you@gmail.com)"
        required: true
      ts_api_key:
        description: "Tailscale API key (device admin, no Bearer prefix)"
        required: true
      ts_authkey:
        description: "Tailscale Auth key (reusable or ephemeral)"
        required: true
      tailscale_version:
        description: "Tailscale version (e.g. 1.82.0)"
        required: false
        default: "1.82.0"
      rustdesk_version:
        description: "RustDesk version (e.g. 1.3.1)"
        required: false
        default: "1.3.1"
      quick_test:
        description: "Run 5-minute test"
        type: boolean
        default: false
      runtime_minutes:
        description: "Runtime in minutes (max 360, default 355)"
        required: false
        default: "355"
      do_purge:
        description: "Purge bullet* devices at start (single-instance only)"
        required: false
        default: "true"
      cycles:
        description: "0 = stop after this run; N = handoffs remaining"
        required: false
        default: "0"
      rdp_count:
        description: "Number of RDP instances (1-10), ignored if crd_code provided"
        required: false
        default: "1"
      crd_code:
        description: "Raw CRD code (4/0AV...) or full command or --code= string"
        required: false
        default: ""
      crd_pin:
        description: "CRD PIN (6-12 digits)"
        required: false
        default: "123456"

permissions:
  contents: read
  actions: write

defaults:
  run:
    shell: pwsh

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.mk.outputs.matrix }}
      multi: ${{ steps.mk.outputs.multi }}
    steps:
      - id: mk
        run: |
          $crd = @'
          ${{ inputs.crd_code }}
          '@.Trim()

          if ($crd.Length -gt 0) {
            $n = 1
          } else {
            $n = [int]"${{ inputs.rdp_count }}"
            $n = [Math]::Max(1, [Math]::Min(10, $n))
          }

          $include = @()
          1..$n | ForEach-Object { $include += @{ id = $_ } }
          $matrix = @{ include = $include } | ConvertTo-Json -Compress
          "matrix=$matrix" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8

          $multi = if ($n -gt 1) { '1' } else { '0' }
          "multi=$multi" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8

  rdp:
    needs: setup
    runs-on: windows-latest
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      max-parallel: 10
    timeout-minutes: 370
    env:
      RDP_USER: Bullettemporary
      RDP_PASS: Bullet@12345

    steps:
      - name: Mask secrets
        run: |
          Write-Output "::add-mask::${{ inputs.ts_api_key }}"
          Write-Output "::add-mask::${{ inputs.ts_authkey }}"
          Write-Output "::add-mask::${{ env.RDP_PASS }}"
          Write-Output "::add-mask::${{ inputs.crd_pin }}"
          Write-Host "Secrets masked."

      - name: Resolve hostname and runtime
        run: |
          function Yes($v) { "$v" -match '^(?i:true|1|yes|on)$' }
          function IntOr($v, $d) { if ("$v" -match '^\d+$') { [int]$v } else { [int]$d } }

          $hn = if ("${{ needs.setup.outputs.multi }}" -eq '1') {
            "bullet${{ matrix.id }}"
          } else {
            "bullet"
          }
          "TS_HOSTNAME=$hn" | Out-File -Append $env:GITHUB_ENV

          $runtime = IntOr "${{ inputs.runtime_minutes }}" 355
          if (Yes "${{ inputs.quick_test }}") { $runtime = 5 }
          if (-not (Yes "${{ inputs.quick_test }}") -and $runtime -lt 6) { $runtime = 355 }
          if ($runtime -gt 360) { $runtime = 355 }
          "RUNTIME_MINUTES=$runtime" | Out-File -Append $env:GITHUB_ENV

          Write-Host "Hostname : $hn"
          Write-Host "Runtime  : $runtime min"

      - name: Detect CRD input
        run: |
          $crd = @'
          ${{ inputs.crd_code }}
          '@.Trim()
          $flag = if ($crd.Length -gt 0) { '1' } else { '0' }
          "CRD_ENABLED=$flag" | Out-File -Append $env:GITHUB_ENV
          Write-Host "CRD_ENABLED=$flag"

      - name: Install Chrome Remote Desktop host
        if: env.CRD_ENABLED == '1'
        run: |
          $exe = "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"
          if (Test-Path $exe) { Write-Host "CRD host already installed."; return }

          Write-Host "Installing CRD host..."
          $exePath = "$env:TEMP\chromeremotedesktophost.exe"
          try {
            Invoke-WebRequest -Uri "https://dl.google.com/support/remote_assistance/ChromotingHostSetup.exe" `
              -OutFile $exePath -ErrorAction Stop
            Start-Process -FilePath $exePath -ArgumentList "/silent","/install" -Wait
            Remove-Item $exePath -Force -ErrorAction SilentlyContinue
            Write-Host "EXE installer succeeded."
            return
          } catch {
            Write-Host "EXE failed: $($_.Exception.Message) - trying MSI..."
          }

          $msiPath = "$env:TEMP\chromeremotedesktophost.msi"
          try {
            Invoke-WebRequest -Uri "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" `
              -OutFile $msiPath -ErrorAction Stop
            Start-Process msiexec.exe -ArgumentList "/i","`"$msiPath`"","/quiet","/norestart" -Wait
            Remove-Item $msiPath -Force -ErrorAction SilentlyContinue
            Write-Host "MSI installer succeeded."
          } catch {
            Write-Error "CRD MSI fallback failed: $($_.Exception.Message)"
            exit 1
          }

      - name: Launch Chrome Remote Desktop
        if: env.CRD_ENABLED == '1'
        run: |
          $raw = @'
          ${{ inputs.crd_code }}
          '@.Trim()

          $pin = "${{ inputs.crd_pin }}".Trim()
          if ($pin -notmatch '^\d{6,12}$') {
            Write-Error "crd_pin must be 6-12 digits."
            exit 1
          }

          $starter = "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"
          if (-not (Test-Path $starter)) {
            Write-Error "remoting_start_host.exe not found."
            exit 1
          }

          $code = $null
          if ($raw -match '--code\s*=\s*"?([^"\s]+)') {
            $code = $Matches[1]
          } elseif ($raw -match '^4/') {
            $code = $raw
          }

          if ($code) {
            $redir = "https://remotedesktop.google.com/_/oauthredirect"
            $argList = @(
              "--code=`"$code`"",
              "--redirect-url=`"$redir`"",
              "--name=`"$Env:COMPUTERNAME`"",
              "--pin=`"$pin`""
            )
            Start-Process -FilePath $starter -ArgumentList $argList
            Write-Host "CRD launched with extracted code."
          } elseif ($raw -match 'remoting_start_host\.exe') {
            Write-Warning "Running raw CRD command. PIN may not be applied."
            $tmp = "$env:TEMP\crd_full_${{ matrix.id }}.ps1"
            Set-Content -Path $tmp -Value $raw -Encoding UTF8
            powershell -ExecutionPolicy Bypass -File $tmp
          } else {
            Write-Error "Could not detect a valid CRD code."
            exit 1
          }

      - name: Verify CRD service registration
        if: env.CRD_ENABLED == '1'
        run: |
          $svcName = "Chrome Remote Desktop Service"
          $deadline = (Get-Date).AddSeconds(60)
          $ok = $false
          while ((Get-Date) -lt $deadline) {
            $svc = Get-Service -Name $svcName -ErrorAction SilentlyContinue
            if ($svc -and $svc.Status -in 'Running','StartPending') { $ok = $true; break }
            Start-Sleep -Seconds 3
          }
          if ($ok) {
            Write-Host "[$svcName] is running or starting."
          } else {
            Write-Warning "[$svcName] did not reach Running state within 60s."
          }

          $logDir = "$env:ProgramData\Google\Chrome Remote Desktop"
          if (Test-Path $logDir) {
            Get-ChildItem $logDir -Filter "host*.log" |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 2 |
              ForEach-Object {
                Write-Host "----- LOG: $($_.FullName) -----"
                Get-Content $_.FullName -Tail 200
              }
          } else {
            Write-Host "CRD log directory not found: $logDir"
          }

      - name: Purge stale bullet* Tailscale devices
        if: needs.setup.outputs.multi == '0'
        run: |
          function Yes($v) { "$v" -match '^(?i:true|1|yes|on)$' }
          if (-not (Yes "${{ inputs.do_purge }}")) { Write-Host "Purge disabled."; return }

          try {
            $auth = [Convert]::ToBase64String(
              [Text.Encoding]::ASCII.GetBytes("${{ inputs.ts_api_key }}:")
            )
            $headers = @{ Authorization = "Basic $auth" }
            $tn = [uri]::EscapeDataString("${{ inputs.ts_tailnet }}")
            $resp = Invoke-RestMethod `
              -Uri "https://api.tailscale.com/api/v2/tailnet/$tn/devices" `
              -Headers $headers -ErrorAction Stop
            $purged = 0
            foreach ($d in $resp.devices) {
              if ($d.hostname -match '^bullet\d*$') {
                Invoke-RestMethod -Method Delete `
                  -Uri "https://api.tailscale.com/api/v2/device/$($d.id)" `
                  -Headers $headers -ErrorAction SilentlyContinue | Out-Null
                Write-Host "Purged: $($d.hostname) ($($d.id))"
                $purged++
              }
            }
            Write-Host "Purged $purged device(s)."
          } catch {
            Write-Warning "Purge warning: $($_.Exception.Message)"
          }

      - name: Install and connect Tailscale
        run: |
          $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"
          if (-not (Test-Path $ts)) {
            $ver = "${{ inputs.tailscale_version }}"
            $url = "https://pkgs.tailscale.com/stable/tailscale-setup-$ver-amd64.msi"
            $dst = "$env:TEMP\tailscale.msi"
            Write-Host "Downloading Tailscale $ver..."
            Invoke-WebRequest -Uri $url -OutFile $dst -ErrorAction Stop
            Start-Process msiexec.exe -ArgumentList "/i","`"$dst`"","/quiet","/norestart" -Wait
            Remove-Item $dst -Force -ErrorAction SilentlyContinue
          }

          & $ts logout 2>&1 | Out-Null
          & $ts up `
            --authkey "${{ inputs.ts_authkey }}" `
            --hostname "$env:TS_HOSTNAME" `
            --accept-dns=true `
            --accept-routes=true

          $ip4 = (& $ts ip -4 | Select-Object -First 1).Trim()
          if (-not $ip4) { Write-Error "Could not obtain Tailscale IPv4."; exit 1 }
          "TAILSCALE_IP=$ip4" | Out-File -Append $env:GITHUB_ENV
          Write-Host "Tailscale IPv4: $ip4"

      - name: Configure RDP user and firewall
        run: |
          $u = $env:RDP_USER
          $p = $env:RDP_PASS
          $sec = ConvertTo-SecureString $p -AsPlainText -Force

          if (Get-LocalUser -Name $u -ErrorAction SilentlyContinue) {
            Set-LocalUser -Name $u -Password $sec -AccountNeverExpires $true
            Enable-LocalUser -Name $u
          } else {
            New-LocalUser -Name $u -Password $sec -AccountNeverExpires
          }
          foreach ($grp in "Administrators","Remote Desktop Users") {
            Add-LocalGroupMember -Group $grp -Member $u -ErrorAction SilentlyContinue
          }

          Set-ItemProperty "HKLM:\System\CurrentControlSet\Control\Terminal Server" `
            -Name fDenyTSConnections -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" | Out-Null
          Write-Host "RDP ready  user=$u  host=$env:TS_HOSTNAME  ip=$env:TAILSCALE_IP"

      - name: Install Python automation libraries
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install --force-reinstall pyautogui pynput pillow --quiet
          python -c "import pyautogui, pynput, PIL; print('Python libs OK')"

      - name: Install RustDesk
        run: |
          $rdExe = "C:\Program Files\RustDesk\rustdesk.exe"
          if (Test-Path $rdExe) { Write-Host "RustDesk already installed."; return }

          $ver = "${{ inputs.rustdesk_version }}"
          $url = "https://github.com/rustdesk/rustdesk/releases/download/$ver/rustdesk-$ver-x86_64.msi"
          $msi = "$env:TEMP\rustdesk.msi"
          try {
            Invoke-WebRequest -Uri $url -OutFile $msi -ErrorAction Stop
            Start-Process msiexec.exe -ArgumentList "/i","`"$msi`"","/quiet","/norestart" -Wait
            Remove-Item $msi -Force -ErrorAction SilentlyContinue
            Write-Host "RustDesk installed via MSI."
          } catch {
            Write-Host "MSI failed ($($_.Exception.Message)) - trying winget..."
            winget install --id RustDesk.RustDesk -e --silent `
              --accept-package-agreements --accept-source-agreements --disable-interactivity
          }

          if (-not (Test-Path $rdExe)) {
            Write-Error "RustDesk not found after install."
            exit 1
          }

      - name: Open RustDesk firewall ports
        run: |
          foreach ($p in 21115..21119) {
            $name = "RustDesk-TCP-$p"
            netsh advfirewall firewall delete rule name="$name" 2>$null
            netsh advfirewall firewall add rule name="$name" dir=in action=allow protocol=TCP localport=$p | Out-Null
          }
          netsh advfirewall firewall delete rule name="RustDesk-UDP-21116" 2>$null
          netsh advfirewall firewall add rule name="RustDesk-UDP-21116" dir=in action=allow protocol=UDP localport=21116 | Out-Null
          Write-Host "RustDesk firewall rules applied."

      - name: Launch RustDesk and upload screenshot
        run: |
          $rdExe = "C:\Program Files\RustDesk\rustdesk.exe"
          Start-Process -FilePath $rdExe -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 5

          Add-Type -AssemblyName System.Windows.Forms, System.Drawing
          $bounds = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          $bitmap = [System.Drawing.Bitmap]::new($bounds.Width, $bounds.Height)
          $graphics = [System.Drawing.Graphics]::FromImage($bitmap)
          $graphics.CopyFromScreen($bounds.Location, [System.Drawing.Point]::Empty, $bounds.Size)
          $shotPath = "$env:TEMP\rustdesk_id${{ matrix.id }}.png"
          $bitmap.Save($shotPath, [System.Drawing.Imaging.ImageFormat]::Png)
          $graphics.Dispose()
          $bitmap.Dispose()

          try {
            $resp = Invoke-RestMethod -Method Post `
              -Uri "https://store1.gofile.io/uploadFile" `
              -Form @{ file = Get-Item $shotPath } `
              -ErrorAction Stop
            if ($resp.status -eq "ok") {
              "SCREENSHOT_URL=$($resp.data.downloadPage)" | Out-File -Append $env:GITHUB_ENV
              Write-Host "Screenshot: $($resp.data.downloadPage)"
            } else {
              Write-Warning "Gofile upload status: $($resp.status)"
            }
          } catch {
            Write-Warning "Screenshot upload failed: $($_.Exception.Message)"
          }

      - name: Keep alive
        run: |
          $mins = [int]$env:RUNTIME_MINUTES
          $end = (Get-Date).AddMinutes($mins)
          $mode = if ($env:CRD_ENABLED -eq '1') { '[CRD+RustDesk/RDP]' } else { '[RustDesk/RDP]' }
          while ((Get-Date) -lt $end) {
            Write-Host ("$mode  Heartbeat {0}  ends {1}  | Screenshot: {2}" -f
              (Get-Date).ToString("HH:mm:ss"),
              $end.ToString("HH:mm:ss"),
              $env:SCREENSHOT_URL)
            Start-Sleep -Seconds 60
          }

      - name: Dispatch next workflow or stop
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $cycles = [int]"${{ inputs.cycles }}"
          if ($cycles -le 0) { Write-Host "cycles=0 - nothing to dispatch."; return }

          $next = $cycles - 1
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
          }

          if ($next -le 0) {
            $body = @{
              ref = "${{ github.ref_name }}"
              inputs = @{
                ts_tailnet  = "${{ inputs.ts_tailnet }}"
                ts_api_key  = "${{ inputs.ts_api_key }}"
                base_prefix = "bullet"
                max_count   = "10"
                dry_run     = "false"
              }
            } | ConvertTo-Json -Depth 20
            Invoke-RestMethod -Method Post `
              -Uri "https://api.github.com/repos/${{ github.repository }}/actions/workflows/rdp-tailscale-stop.yml/dispatches" `
              -Headers $headers -Body $body | Out-Null
            Write-Host "Dispatched STOP workflow."
          } else {
            $body = @{
              ref = "${{ github.ref_name }}"
              inputs = @{
                ts_tailnet      = "${{ inputs.ts_tailnet }}"
                ts_api_key      = "${{ inputs.ts_api_key }}"
                ts_authkey      = "${{ inputs.ts_authkey }}"
                quick_test      = "${{ inputs.quick_test }}"
                runtime_minutes = "${{ inputs.runtime_minutes }}"
                do_purge        = "${{ inputs.do_purge }}"
                cycles          = "$next"
                rdp_count       = "${{ inputs.rdp_count }}"
                crd_code        = "${{ inputs.crd_code }}"
                crd_pin         = "${{ inputs.crd_pin }}"
              }
            } | ConvertTo-Json -Depth 20
            Invoke-RestMethod -Method Post `
              -Uri "https://api.github.com/repos/${{ github.repository }}/actions/workflows/rdp-tailscale-B.yml/dispatches" `
              -Headers $headers -Body $body | Out-Null
            Write-Host "Dispatched Workflow B with cycles=$next."
          }
